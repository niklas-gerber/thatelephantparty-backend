services:
  backend:
    build: .
    restart: always
    ports:
      # Nur lokal gebunden! Traffic kommt über Nginx.
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL}
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - TZ=${TZ}
    volumes:
      # NUR die Logs werden als Volume gemountet, der Code ist fest im Image.
      - ./logs:/backend/logs 
    depends_on:
      db:
        condition: service_healthy 

  db:
    image: postgres:15-alpine 
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s 

volumes:
  postgres_data: